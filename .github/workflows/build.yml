name: Android CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Настраиваем глобальный Gradle в облаке
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    # Собираем проект через глобальный gradle вместо ./gradlew
    - name: Build with Gradle
      run: gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Vivo-Shop-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        
